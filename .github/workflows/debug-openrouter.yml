name: Debug OpenRouter

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Check OpenRouter
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd src && python debug_openrouter.py
      - name: Save to repo
        run: |
          mkdir -p data
          cp src/openrouter_debug.json data/openrouter_debug.json
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/openrouter_debug.json
          git commit -m "chore: openrouter debug [skip ci]" || echo "nothing to commit"
          git push
