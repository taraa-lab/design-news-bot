name: Daily Design News Bot

on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic feedparser requests beautifulsoup4 python-dateutil lxml \
                      google-auth google-auth-httplib2 google-api-python-client
      - name: Create required directories
        run: mkdir -p reports logs
      - name: Run bot
        env:
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY:      ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN:      ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:        ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_SHEET_ID:         ${{ secrets.GOOGLE_SHEET_ID }}
        run: cd src && python main.py
      - uses: actions/upload-artifact@v4
        with:
          name: design-news-${{ github.run_id }}
          path: reports/
          retention-days: 30
