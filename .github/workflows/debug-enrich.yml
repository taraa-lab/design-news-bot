name: Debug Enrich

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install anthropic feedparser requests beautifulsoup4 python-dateutil lxml
      - name: Run enrich debug
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd src && python debug_enrich.py
      - name: Save to repo
        run: |
          mkdir -p data
          cp enrich_debug.json data/enrich_debug.json
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/enrich_debug.json
          git commit -m "chore: enrich debug report [skip ci]" || echo "nothing to commit"
          git push
